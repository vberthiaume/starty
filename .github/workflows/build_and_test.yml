name: Starty

on:
  workflow_dispatch: # lets you run a build from the UI
  workflow_call: # lets other workflows (like nightly.yml) call this one
  push:
  pull_request:

# When pushing new commits, cancel any running builds on that branch
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  BUILD_DIR: Builds
  DISPLAY: :0 # linux pluginval needs this
  HOMEBREW_NO_INSTALL_CLEANUP: 1
  SCCACHE_GHA_ENABLED: true
  SCCACHE_CACHE_MULTIARCH: 1

defaults:
  run:
    shell: bash

# jobs are run in parallel on different machines
# all steps run in series
jobs:
  build_and_test:
    # don't double run on PRs
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # show all errors for each platform (vs. cancel jobs on error)
      matrix:
        include:
          - name: Linux
            os: ubuntu-22.04
            pluginval-binary: ./pluginval
            extra-flags: -G Ninja
          - name: macOS
            os: macos-14
            pluginval-binary: pluginval.app/Contents/MacOS/pluginval
            extra-flags: -G Ninja -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          - name: Windows
            os: windows-latest
            pluginval-binary: ./pluginval.exe
            extra-flags: -G Ninja

    steps:
      # Setup MSVC toolchain and developer command prompt (Windows)
      - uses: ilammy/msvc-dev-cmd@v1

      # Use clang on Linux so we don't introduce a 3rd compiler (Windows and macOS use MSVC and Clang)
      - name: Set up Clang
        if: runner.os == 'Linux'
        uses: egor-tensin/setup-clang@v2

      # This also starts up our "fake" display (Xvfb), needed for pluginval
      - name: Install JUCE's Linux Deps
        if: runner.os == 'Linux'
        # Thanks to McMartin & co https://forum.juce.com/t/list-of-juce-dependencies-under-linux/15121/44
        run: |
          sudo apt-get update && sudo apt install libasound2-dev libx11-dev libxinerama-dev libxext-dev libfreetype6-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev xvfb ninja-build
          sudo /usr/bin/Xvfb $DISPLAY &

      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja

      - name: Install macOS Deps
        if: ${{ runner.os == 'macOS' }}
        run: brew install ninja osxutils

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache the build
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Configure
        run: cmake -B ${{ env.BUILD_DIR }} -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE}} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache ${{ matrix.extra-flags }} .

      - name: Build
        run: cmake --build ${{ env.BUILD_DIR }} --config ${{ env.BUILD_TYPE }}

      - name: Test & Benchmarks
        working-directory: ${{ env.BUILD_DIR }}
        run: ctest --verbose --output-on-failure

      - name: Read in .env from CMake # see GitHubENV.cmake
        run: |
          cat .env # show us the config
          cat .env >> $GITHUB_ENV # pull in our PRODUCT_NAME, etc

      - name: Set additional env vars for next steps
        run: |
          ARTIFACTS_PATH=${{ env.BUILD_DIR }}/${{ env.PROJECT_NAME }}_artefacts/${{ env.BUILD_TYPE }}
          echo "ARTIFACTS_PATH=$ARTIFACTS_PATH" >> $GITHUB_ENV
          echo "VST3_PATH=$ARTIFACTS_PATH/VST3/${{ env.PRODUCT_NAME }}.vst3" >> $GITHUB_ENV
          echo "AU_PATH=$ARTIFACTS_PATH/AU/${{ env.PRODUCT_NAME }}.component" >> $GITHUB_ENV
          echo "AUV3_PATH=$ARTIFACTS_PATH/AUv3/${{ env.PRODUCT_NAME }}.appex" >> $GITHUB_ENV
          echo "CLAP_PATH=$ARTIFACTS_PATH/CLAP/${{ env.PRODUCT_NAME }}.clap" >> $GITHUB_ENV
          echo "STANDALONE_PATH=$ARTIFACTS_PATH/Standalone/${{ env.PRODUCT_NAME }}.app" >> $GITHUB_ENV
          echo "ARTIFACT_NAME=${{ env.PRODUCT_NAME }}-${{ env.VERSION }}-${{ runner.os }}" >> $GITHUB_ENV

      - name: Pluginval
        run: |
          curl -LO "https://github.com/Tracktion/pluginval/releases/download/v1.0.3/pluginval_${{ runner.os }}.zip"
          7z x pluginval_${{ runner.os }}.zip
          ${{ matrix.pluginval-binary }} --strictness-level 10 --verbose --validate "${{ env.VST3_PATH }}"

      # Apple codesigning disabled — re-enable once a Developer ID cert is available.
      # - name: Import Certificates (macOS)
      #   uses: sudara/basic-macos-keychain-action@v1
      #   id: keychain
      #   if: ${{ runner.os == 'macOS'}}
      #   with:
      #     dev-id-app-cert: ${{ secrets.DEV_ID_APP_CERT }}
      #     dev-id-app-password: ${{ secrets.DEV_ID_APP_PASSWORD }}
      #     dev-id-installer-cert: ${{ secrets.DEV_ID_INSTALLER_CERT }}
      #     dev-id-installer-password: ${{ secrets.DEV_ID_INSTALLER_PASSWORD }}
      #
      # - name: Codesign (macOS)
      #   if: ${{ runner.os == 'macOS' }}
      #   timeout-minutes: 5
      #   run: |
      #     # Each plugin must be code signed
      #     codesign --force --keychain ${{ steps.keychain.outputs.keychain-path }} -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.VST3_PATH }}" --deep --strict --options=runtime --timestamp
      #     codesign --force --keychain ${{ steps.keychain.outputs.keychain-path }} -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.AU_PATH }}" --deep --strict --options=runtime --timestamp
      #     codesign --force --keychain ${{ steps.keychain.outputs.keychain-path }} -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.CLAP_PATH }}" --deep --strict --options=runtime --timestamp
      #     codesign --force --keychain ${{ steps.keychain.outputs.keychain-path }} -s "${{ secrets.DEVELOPER_ID_APPLICATION}}" -v "${{ env.STANDALONE_PATH }}" --deep --strict --options=runtime --timestamp

      - name: Add Custom Icons (macOS)
        if: ${{ runner.os == 'macOS' }}
        run: |
          # add the icns as its own icon resource (meta!)
          sips -i packaging/starty.icns

          # Grab the resource, put in tempfile
          DeRez -only icns packaging/starty.icns > /tmp/icons

          # Stuff the resource into the strange Icon? file's resource fork
          Rez -a /tmp/icons -o "${{ env.VST3_PATH }}/Icon"$'\r'
          Rez -a /tmp/icons -o "${{ env.AU_PATH }}/Icon"$'\r'
          Rez -a /tmp/icons -o "${{ env.CLAP_PATH }}/Icon"$'\r'

          # Set custom icon attribute
          SetFile -a C "${{ env.VST3_PATH }}"
          SetFile -a C "${{ env.AU_PATH }}"
          SetFile -a C "${{ env.CLAP_PATH }}"

      - name: Build macOS Installer pkg (unsigned)
        if: ${{ runner.os == 'macOS' }}
        timeout-minutes: 5
        run: |
          pkgbuild --identifier "${{ env.BUNDLE_ID }}.au.pkg" --version $VERSION --component "${{ env.AU_PATH }}" --install-location "/Library/Audio/Plug-Ins/Components"  "packaging/${{ env.PRODUCT_NAME }}.au.pkg"
          pkgbuild --identifier "${{ env.BUNDLE_ID }}.vst3.pkg" --version $VERSION --component "${{ env.VST3_PATH }}" --install-location "/Library/Audio/Plug-Ins/VST3" "packaging/${{ env.PRODUCT_NAME }}.vst3.pkg"
          pkgbuild --identifier "${{ env.BUNDLE_ID }}.clap.pkg" --version $VERSION --component "${{ env.CLAP_PATH }}" --install-location "/Library/Audio/Plug-Ins/CLAP" "packaging/${{ env.PRODUCT_NAME }}.clap.pkg"

          # Standalone is special, needs a boolean to always install in /Applications
          pkgbuild --analyze --root "$(dirname "${{ env.STANDALONE_PATH }}")" standalone.plist
          plutil -replace BundleIsRelocatable -bool NO standalone.plist
          pkgbuild --identifier "${{ env.BUNDLE_ID }}.app.pkg" --version $VERSION --root "$(dirname "${{ env.STANDALONE_PATH }}")" --component-plist standalone.plist --install-location "/Applications" "packaging/${{ env.PRODUCT_NAME }}.app.pkg"

          cd packaging
          envsubst < distribution.xml.template > distribution.xml
          # Unsigned pkg — skip --sign/--timestamp until Developer ID Installer cert is configured
          productbuild --resources ./resources --distribution distribution.xml "${{ env.ARTIFACT_NAME }}.pkg"

      # Apple notarization disabled — re-enable once a Developer ID cert & Apple ID are available.
      # - name: Notarize macOS Installer pkg
      #   if: ${{ runner.os == 'macOS' }}
      #   timeout-minutes: 5
      #   run: |
      #     cd packaging
      #     # Re-sign with Developer ID Installer cert, then notarize and staple
      #     productbuild --resources ./resources --distribution distribution.xml --sign "${{ secrets.DEVELOPER_ID_INSTALLER }}" --timestamp "${{ env.ARTIFACT_NAME }}.pkg"
      #     xcrun notarytool submit "${{ env.ARTIFACT_NAME }}.pkg" --apple-id ${{ secrets.NOTARIZATION_USERNAME }} --password ${{ secrets.NOTARIZATION_PASSWORD }} --team-id ${{ secrets.TEAM_ID }} --wait
      #     xcrun stapler staple "${{ env.ARTIFACT_NAME }}.pkg"

      - name: Zip
        if: ${{ runner.os == 'Linux' }}
        working-directory: ${{ env.ARTIFACTS_PATH }}
        run: 7z a -tzip "${{ env.ARTIFACT_NAME }}.zip" "-xr!lib${{ env.PRODUCT_NAME }}_SharedCode.a" .

      - name: Generate Installer
        if: ${{ runner.os == 'Windows' }}
        run: |
          iscc "packaging\installer.iss"
          mv "packaging/Output/${{ env.ARTIFACT_NAME }}.exe" "${{ env.ARTIFACTS_PATH }}/"

      # Azure Trusted Signing disabled — re-enable once an Azure Code Signing account is available.
      # - name: Codesign with Azure Trusted Signing
      #   if: ${{ runner.os == 'Windows' }}
      #   uses: azure/artifact-signing-action@v1
      #   with:
      #     azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
      #     endpoint: ${{ secrets.AZURE_ENDPOINT }}
      #     signing-account-name: ${{ secrets.AZURE_CODE_SIGNING_NAME }}
      #     certificate-profile-name: ${{ secrets.AZURE_CERT_PROFILE_NAME }}
      #     files-folder: ${{ env.ARTIFACTS_PATH }}
      #     files-folder-filter: exe

      - name: Upload Exe (Windows)
        if: ${{ runner.os == 'Windows' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}.exe
          path: "${{ env.ARTIFACTS_PATH }}/${{ env.ARTIFACT_NAME }}.exe"

      - name: Upload Zip (Linux)
        if: ${{ runner.os == 'Linux' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}.zip
          path: "${{ env.ARTIFACTS_PATH }}/${{ env.ARTIFACT_NAME }}.zip"

      - name: Upload pkg (macOS)
        if: ${{ runner.os == 'macOS' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}.pkg
          path: packaging/${{ env.ARTIFACT_NAME }}.pkg

  sanitizers:
    # don't double run on PRs (same logic as build_and_test above)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
    # Build *only* the Tests target (via cmake --build --target Tests) with
    # runtime sanitizers enabled. juce_add_plugin still runs at configure time
    # (Tests.cmake / Benchmarks.cmake read COMPILE_DEFINITIONS off the plugin
    # target), but the AU/VST3/Standalone format targets are never built because
    # they're not a dependency of Tests.
    strategy:
      fail-fast: false
      matrix:
        include:
          # ASan and RTSan route through lld. UBSan and TSan use the default
          # linker — they pass as-is.
          #
          # ASan: gold's --gc-sections discards asan.module_ctor/dtor sections
          # during LTO, leaving dangling refs in .init_array. lld handles the
          # section-group semantics correctly.
          #
          # RTSan: requires Clang 20+ (when -fsanitize=realtime shipped). We
          # install clang-20/lld-20 from apt.llvm.org on a plain ubuntu-latest
          # runner rather than using a prebuilt container (previous attempt
          # used ghcr.io/guillaumeriousat/algogris-rtsan, but its custom Clang
          # 20 + no bundled lld led to LTO bitcode version mismatches).
          - name: AddressSanitizer
            c_flags:      "-fsanitize=address -fsanitize=undefined -fno-omit-frame-pointer -g"
            linker_flags: "-fsanitize=address -fsanitize=undefined -fuse-ld=lld"

          - name: UndefinedBehaviorSanitizer
            c_flags:      "-fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -g"
            linker_flags: "-fsanitize=undefined"

          - name: ThreadSanitizer
            c_flags:      "-fsanitize=thread -fno-omit-frame-pointer -g"
            linker_flags: "-fsanitize=thread"

          - name: RealtimeSanitizer
            cc:           clang-20
            cxx:          clang++-20
            c_flags:      "-fsanitize=realtime"
            linker_flags: "-fsanitize=realtime -fuse-ld=lld-20"

    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    env:
      UBSAN_OPTIONS: "halt_on_error=1:abort_on_error=1"
      CC:  ${{ matrix.cc  || 'clang' }}
      CXX: ${{ matrix.cxx || 'clang++' }}

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # Ubuntu's default clang (18) for ASan/UBSan/TSan. RTSan needs a newer
      # compiler, handled below.
      - name: Set up Clang
        if: matrix.name != 'RealtimeSanitizer'
        uses: egor-tensin/setup-clang@v2

      # RTSan requires Clang 20+ and a matching lld (apt's lld 18 can't read
      # bitcode produced by clang-20 under LTO). apt.llvm.org's llvm.sh installs
      # clang/lld/etc. for a pinned LLVM version from the upstream apt repo.
      - name: Install Clang 20 + lld 20 (RTSan)
        if: matrix.name == 'RealtimeSanitizer'
        run: |
          wget -qO llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y clang-20 lld-20

      # Tests links SharedCode, which pulls in juce_gui_basics/juce_gui_extra —
      # so we need the Linux GUI dev libraries even though we never build the
      # standalone/plugin binaries themselves. lld is here for the ASan job
      # (RTSan installed its own lld-20 above).
      - name: Install JUCE Linux dependencies
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y ninja-build lld
          libasound2-dev libx11-dev libxinerama-dev libxext-dev
          libfreetype6-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev

      - name: Configure
        run: >-
          cmake -B Builds
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_FLAGS="${{ matrix.c_flags }}"
          -DCMAKE_CXX_FLAGS="${{ matrix.c_flags }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.linker_flags }}"
          -DCMAKE_SHARED_LINKER_FLAGS="${{ matrix.linker_flags }}"

      - name: Build
        run: cmake --build Builds --target Tests

      # Benchmarks.cmake's catch_discover_tests(Benchmarks) registers a
      # "<name>_NOT_BUILT-<hash>" placeholder test whenever the Benchmarks
      # binary is missing. Since we deliberately skip building Benchmarks under
      # sanitizers (they're too slow to instrument), we filter that placeholder
      # out of the ctest run rather than build the whole benchmark suite.
      - name: Test
        run: ctest --test-dir Builds --output-on-failure --verbose -E NOT_BUILT

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # needed to post PR review comments

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0     # cpp-linter needs history to diff changed files

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Install JUCE Linux dependencies
        run: >-
          sudo apt-get install -y
          libasound2-dev libx11-dev libxinerama-dev libxext-dev
          libfreetype6-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev

      # Configure with the plugin target enabled so compile_commands.json covers
      # every one of our source files (plugin + tests).
      - name: Configure
        run: >-
          cmake -B Builds
          -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      # Build so JUCE's juceaide-generated headers exist on disk before tidy
      # tries to parse includes referencing them.
      - name: Build
        run: cmake --build Builds -j

      # cpp-linter runs clang-tidy and posts findings as PR review comments
      # (on pull_request) or a step summary (on push). It uses .clang-tidy
      # from the repo root and compile_commands.json from Builds/.
      - uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: ''                  # don't run clang-format
          tidy-checks: ''            # use project .clang-tidy
          database: Builds
          files-changed-only: false
          # Only post a summary comment on PRs. On push events cpp-linter would
          # try to post a commit comment, which needs contents:write — not
          # worth the broader token scope since the Actions step summary already
          # shows push-run results.
          thread-comments: ${{ github.event_name == 'pull_request' }}
          tidy-review: true
          step-summary: true
          extensions: cpp,h
          # Skip build output, JUCE, submodules, cmake includes, and CI configs.
          # We only want tidy to look at our own source tree (source/, tests/,
          # benchmarks/). benchmarks/Benchmarks.cpp is textually #included into
          # Catch2Main.cpp rather than compiled as its own TU, so it isn't in
          # compile_commands.json — clang-tidy can't lint it standalone.
          ignore: 'Builds|JUCE|modules|cmake|.github|benchmarks/Benchmarks.cpp'

      # Step exits 1 when tidy finds anything, but continue-on-error keeps the
      # job green — the step still shows a ⚠️ in the Actions UI and findings
      # appear in the step summary / PR comments. Drop continue-on-error to
      # turn tidy findings into hard merge blockers.
      - name: Fail on tidy issues
        if: steps.linter.outputs.checks-failed > 0
        continue-on-error: true
        run: |
          echo "clang-tidy reported issues — see PR comments / step summary."
          exit 1

  release:
    if: contains(github.ref, 'tags/v')
    runs-on: ubuntu-latest
    needs: build_and_test

    steps:
      - name: Get Artifacts
        uses: actions/download-artifact@v8

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          # download-artifact puts these files in their own dirs...
          # Using globs sidesteps having to pass the version around
          files: |
            */*.exe
            */*.zip
            */*.dmg
