name: Install Linux dependencies
description: apt-get the build tools, JUCE Linux dev libraries, and xvfb (used for pluginval) shared by every Linux job in the workflow. Optionally starts Xvfb in the background.

inputs:
  start-xvfb:
    description: Start Xvfb in the background after install (needed for pluginval).
    default: 'false'

runs:
  using: composite
  steps:
    - shell: bash
      run: >-
        sudo apt-get update &&
        sudo apt-get install -y ninja-build lld xvfb
        libasound2-dev libx11-dev libxinerama-dev libxext-dev
        libfreetype6-dev libwebkit2gtk-4.1-dev libglu1-mesa-dev

    - if: ${{ inputs.start-xvfb == 'true' }}
      shell: bash
      run: sudo /usr/bin/Xvfb $DISPLAY &
